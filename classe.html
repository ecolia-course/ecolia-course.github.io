<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ECO - Tronc Commun</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(160deg, #1a3a2a 0%, #0d1f14 100%);
            color: #e8f5e9;
            min-height: 100vh;
        }

        .app-container {
            max-width: 500px;
            min-height: 100vh;
            margin: 0 auto;
            background: rgba(13, 31, 20, 0.95);
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.3);
        }

        .header {
            position: sticky;
            top: 0;
            padding: 15px 20px;
            background: rgba(26, 58, 42, 0.98);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #4caf50;
        }

        .back-btn {
            background: rgba(76, 175, 80, 0.2);
            border: none;
            color: #a5d6a7;
            font-size: 1.2rem;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: rgba(76, 175, 80, 0.35);
        }

        .header-info h2 {
            color: #c8e6c9;
            font-size: 1.2rem;
        }

        .header-info p {
            color: #a5d6a7;
            font-size: 0.75rem;
        }

        .main-content {
            padding: 15px;
        }

        .classe-hero {
            text-align: center;
            padding: 10px 0 20px;
        }

        .classe-hero .icon {
            font-size: 3.5rem;
        }

        .classe-hero h1 {
            color: #ffd54f;
            font-size: 1.6rem;
        }

        .courses-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .course-card {
            background: rgba(76, 175, 80, 0.06);
            border: 1px solid rgba(76, 175, 80, 0.2);
            border-left: 4px solid #4caf50;
            border-radius: 10px;
            padding: 14px 15px;
            text-decoration: none;
            color: #e8f5e9;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .course-card:hover {
            background: rgba(76, 175, 80, 0.13);
            transform: translateX(5px);
            border-color: #66bb6a;
        }

        .course-emoji {
            font-size: 1.8rem;
        }

        .course-info h3 {
            color: #c8e6c9;
            font-size: 0.95rem;
        }

        .course-info p {
            color: #a5d6a7;
            font-size: 0.75rem;
        }

        .badge-row {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.65rem;
            padding: 2px 7px;
            border-radius: 6px;
        }

        .badge-chapitre {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
        }

        .badge-audio {
            background: rgba(255, 213, 79, 0.2);
            color: #ffd54f;
        }

        .badge-quiz {
            background: rgba(33, 150, 243, 0.2);
            color: #64b5f6;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="index.html" class="back-btn">← Retour</a>
            <div class="header-info">
                <h2 id="classeTitre">7ᵉ année</h2>
                <p>Tronc Commun</p>
            </div>
        </div>

        <div class="main-content">
            <div class="classe-hero">
                <div class="icon">📘</div>
                <h1 id="classeHero">7ᵉ année</h1>
            </div>

            <div class="courses-list" id="coursesList">
                <!-- Rempli dynamiquement par JS -->
            </div>
        </div>
    </div>

    <script>
        // Récupérer la classe depuis l'URL
        const params = new URLSearchParams(window.location.search);
        const classe = params.get('classe') || '7e';

        // Titres et icônes
        const classeData = {
            '7e': { titre: '7ᵉ année', icon: '📘', hero: '7ᵉ année secondaire' },
            '8e': { titre: '8ᵉ année', icon: '📙', hero: '8ᵉ année secondaire' }
        };

        // Mettre à jour les titres
        document.getElementById('classeTitre').textContent = classeData[classe].titre;
        document.getElementById('classeHero').textContent = classeData[classe].hero;

        // Matières par classe (basé sur le programme national congolais)
        const matieres = {
            '7e': [
                { nom: 'Mathématiques', emoji: '📐', chapitres: '12 chapitres', matiere: 'math-7e' },
                { nom: 'Français', emoji: '📝', chapitres: '10 chapitres', matiere: 'francais-7e' },
                { nom: 'SVT (Sciences de la Vie et de la Terre)', emoji: '🌿', chapitres: '8 chapitres', matiere: 'svt-7e' },
                { nom: 'Physique', emoji: '⚡', chapitres: '6 chapitres', matiere: 'physique-7e' },
                { nom: 'Histoire-Géographie', emoji: '🌍', chapitres: '8 chapitres', matiere: 'histgeo-7e' },
                { nom: 'Anglais', emoji: '🇬🇧', chapitres: '8 leçons', matiere: 'anglais-7e' },
                { nom: 'Éducation Civique et Morale', emoji: '🤝', chapitres: '5 chapitres', matiere: 'ecm-7e' },
                { nom: 'Religion', emoji: '🙏', chapitres: '6 chapitres', matiere: 'religion-7e' },
                { nom: 'Éducation Physique', emoji: '🏃', chapitres: '4 modules', matiere: 'ep-7e' },
            ],
            '8e': [
                { nom: 'Mathématiques', emoji: '📐', chapitres: '12 chapitres', matiere: 'math-8e' },
                { nom: 'Français', emoji: '📝', chapitres: '10 chapitres', matiere: 'francais-8e' },
                { nom: 'SVT', emoji: '🌿', chapitres: '9 chapitres', matiere: 'svt-8e' },
                { nom: 'Physique', emoji: '⚡', chapitres: '7 chapitres', matiere: 'physique-8e' },
                { nom: 'Chimie', emoji: '🧪', chapitres: '6 chapitres', matiere: 'chimie-8e' },
                { nom: 'Histoire-Géographie', emoji: '🌍', chapitres: '8 chapitres', matiere: 'histgeo-8e' },
                { nom: 'Anglais', emoji: '🇬🇧', chapitres: '8 leçons', matiere: 'anglais-8e' },
                { nom: 'Éducation Civique et Morale', emoji: '🤝', chapitres: '5 chapitres', matiere: 'ecm-8e' },
            ]
        };

        const courses = matieres[classe] || matieres['7e'];

        // Fonction pour déterminer la page de destination selon le nom de la matière
        function getCourseLink(matiereObj, classeLevel) {
            const nomMatiere = matiereObj.nom;
            // Pour Mathématiques
            if (nomMatiere === 'Mathématiques') {
                return classeLevel === '7e' ? 'Math7.html' : 'Math8.html';
            }
            // Pour Anglais
            if (nomMatiere === 'Anglais') {
                return classeLevel === '7e' ? 'Anglais7.html' : 'Anglais8.html';
            }
            // Pour toutes les autres matières, page générique avec paramètre
            return `cours.html?matiere=${matiereObj.matiere}`;
        }

        // Générer les cartes
        const container = document.getElementById('coursesList');
        container.innerHTML = courses.map(m => {
            const lien = getCourseLink(m, classe);
            return `
                <a href="${lien}" class="course-card">
                    <div class="course-emoji">${m.emoji}</div>
                    <div class="course-info">
                        <h3>${m.nom}</h3>
                        <p>${m.chapitres}</p>
                        <div class="badge-row">
                            <span class="badge badge-audio">🎧 Audio</span>
                            <span class="badge badge-quiz">📝 Quiz</span>
                        </div>
                    </div>
                </a>
            `;
        }).join('');
    </script>
</body>
</html>
