<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ECO - Sections</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(160deg, #1a2a3a 0%, #0d1a28 100%);
            color: #e3f2fd;
            min-height: 100vh;
        }

        .app-container {
            max-width: 500px;
            min-height: 100vh;
            margin: 0 auto;
            background: rgba(13, 26, 40, 0.95);
            box-shadow: 0 0 30px rgba(33, 150, 243, 0.25);
        }

        .header {
            position: sticky;
            top: 0;
            padding: 15px 20px;
            background: rgba(26, 42, 58, 0.98);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #2196F3;
        }

        .back-btn {
            background: rgba(33, 150, 243, 0.2);
            border: none;
            color: #90caf9;
            font-size: 1.2rem;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }

        .main-content {
            padding: 15px;
        }

        .section-hero {
            text-align: center;
            padding: 10px 0 15px;
        }

        .section-hero .icon {
            font-size: 3.5rem;
        }

        .section-hero h1 {
            color: #ffd54f;
            font-size: 1.5rem;
        }

        .section-hero p {
            color: #90caf9;
            font-size: 0.85rem;
        }

        /* Sélecteur de classe */
        .class-selector {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 8px 0 15px;
            scrollbar-width: none;
        }

        .class-selector::-webkit-scrollbar {
            display: none;
        }

        .class-btn {
            background: rgba(33, 150, 243, 0.1);
            border: 1px solid rgba(33, 150, 243, 0.25);
            color: #90caf9;
            padding: 9px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .class-btn.active, .class-btn:hover {
            background: rgba(33, 150, 243, 0.3);
            border-color: #2196F3;
            color: white;
        }

        .courses-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .course-card {
            background: rgba(33, 150, 243, 0.05);
            border: 1px solid rgba(33, 150, 243, 0.18);
            border-left: 4px solid #42a5f5;
            border-radius: 10px;
            padding: 14px 15px;
            text-decoration: none;
            color: #e3f2fd;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .course-card:hover {
            background: rgba(33, 150, 243, 0.12);
            transform: translateX(5px);
        }

        .course-emoji {
            font-size: 1.8rem;
        }

        .course-info h3 {
            color: #bbdefb;
            font-size: 0.95rem;
        }

        .course-info p {
            color: #90caf9;
            font-size: 0.75rem;
        }

        .badge-row {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }

        .badge {
            font-size: 0.65rem;
            padding: 2px 7px;
            border-radius: 6px;
        }

        .badge-audio {
            background: rgba(255, 213, 79, 0.2);
            color: #ffd54f;
        }

        .badge-quiz {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="index.html" class="back-btn">← Retour</a>
            <div>
                <h2 style="color:#c8e6c9;font-size:1.1rem;" id="sectionTitre">Scientifique</h2>
            </div>
        </div>

        <div class="main-content">
            <div class="section-hero">
                <div class="icon" id="sectionIcon">🔬</div>
                <h1 id="sectionNom">Scientifique</h1>
                <p id="sectionDesc">Maths-Physique & Biologie-Chimie</p>
            </div>

            <!-- Sélecteur de classe -->
            <div class="class-selector" id="classSelector">
                <button class="class-btn active" onclick="filterClasse('1ere')">1ʳᵉ</button>
                <button class="class-btn" onclick="filterClasse('2e')">2ᵉ</button>
                <button class="class-btn" onclick="filterClasse('3e')">3ᵉ</button>
                <button class="class-btn" onclick="filterClasse('4e')">4ᵉ</button>
            </div>

            <div class="courses-list" id="coursesList">
                <!-- Rempli dynamiquement -->
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const section = params.get('section') || 'scientifique';

        // Configuration des sections
        const sectionsData = {
            'scientifique': {
                nom: 'Scientifique',
                icon: '🔬',
                desc: 'Maths-Physique & Biologie-Chimie',
                matieres: {
                    '1ere': [
                        { nom: 'Mathématiques', emoji: '📐', matiere: 'math-sc-1ere' },
                        { nom: 'Physique', emoji: '⚡', matiere: 'physique-sc-1ere' },
                        { nom: 'Chimie', emoji: '🧪', matiere: 'chimie-sc-1ere' },
                        { nom: 'SVT', emoji: '🌿', matiere: 'svt-sc-1ere' },
                        { nom: 'Français', emoji: '📝', matiere: 'francais-sc-1ere' },
                    ],
                    '2e': [
                        { nom: 'Mathématiques', emoji: '📐', matiere: 'math-sc-2e' },
                        { nom: 'Physique', emoji: '⚡', matiere: 'physique-sc-2e' },
                        { nom: 'Chimie', emoji: '🧪', matiere: 'chimie-sc-2e' },
                        { nom: 'SVT', emoji: '🌿', matiere: 'svt-sc-2e' },
                    ],
                    '3e': [
                        { nom: 'Mathématiques', emoji: '📐', matiere: 'math-sc-3e' },
                        { nom: 'Physique', emoji: '⚡', matiere: 'physique-sc-3e' },
                        { nom: 'Chimie', emoji: '🧪', matiere: 'chimie-sc-3e' },
                        { nom: 'Biologie', emoji: '🧬', matiere: 'biologie-sc-3e' },
                    ],
                    '4e': [
                        { nom: 'Mathématiques', emoji: '📐', matiere: 'math-sc-4e' },
                        { nom: 'Physique', emoji: '⚡', matiere: 'physique-sc-4e' },
                        { nom: 'Chimie', emoji: '🧪', matiere: 'chimie-sc-4e' },
                        { nom: 'Biologie', emoji: '🧬', matiere: 'biologie-sc-4e' },
                    ]
                }
            },
            'latin-philo': {
                nom: 'Latin-Philo',
                icon: '📖',
                desc: 'Lettres, Philosophie, Latin',
                matieres: {
                    '1ere': [
                        { nom: 'Français', emoji: '📝', matiere: 'francais-lp-1ere' },
                        { nom: 'Latin', emoji: '🏛️', matiere: 'latin-lp-1ere' },
                        { nom: 'Philosophie', emoji: '🤔', matiere: 'philo-lp-1ere' },
                        { nom: 'Histoire-Géo', emoji: '🌍', matiere: 'histgeo-lp-1ere' },
                    ],
                    '2e': [
                        { nom: 'Français', emoji: '📝', matiere: 'francais-lp-2e' },
                        { nom: 'Latin', emoji: '🏛️', matiere: 'latin-lp-2e' },
                        { nom: 'Philosophie', emoji: '🤔', matiere: 'philo-lp-2e' },
                    ],
                    '3e': [
                        { nom: 'Français', emoji: '📝', matiere: 'francais-lp-3e' },
                        { nom: 'Philosophie', emoji: '🤔', matiere: 'philo-lp-3e' },
                    ],
                    '4e': [
                        { nom: 'Français', emoji: '📝', matiere: 'francais-lp-4e' },
                        { nom: 'Philosophie', emoji: '🤔', matiere: 'philo-lp-4e' },
                    ]
                }
            },
            'commerciale': {
                nom: 'Commerciale',
                icon: '💼',
                desc: 'Économie, Comptabilité, Management',
                matieres: {
                    '1ere': [
                        { nom: 'Économie', emoji: '📊', matiere: 'eco-com-1ere' },
                        { nom: 'Comptabilité', emoji: '🧾', matiere: 'compta-com-1ere' },
                        { nom: 'Mathématiques Fin.', emoji: '📐', matiere: 'mathfin-com-1ere' },
                    ],
                    '2e': [
                        { nom: 'Économie', emoji: '📊', matiere: 'eco-com-2e' },
                        { nom: 'Comptabilité', emoji: '🧾', matiere: 'compta-com-2e' },
                    ],
                    '3e': [
                        { nom: 'Économie', emoji: '📊', matiere: 'eco-com-3e' },
                        { nom: 'Comptabilité', emoji: '🧾', matiere: 'compta-com-3e' },
                    ],
                    '4e': [
                        { nom: 'Économie', emoji: '📊', matiere: 'eco-com-4e' },
                        { nom: 'Comptabilité', emoji: '🧾', matiere: 'compta-com-4e' },
                    ]
                }
            },
            'pedagogie': {
                nom: 'Pédagogie',
                icon: '👩‍🏫',
                desc: 'Psychopédagogie, Didactique',
                matieres: {
                    '1ere': [{ nom: 'Psychopédagogie', emoji: '🧠', matiere: 'psycho-ped-1ere' }],
                    '2e': [{ nom: 'Psychopédagogie', emoji: '🧠', matiere: 'psycho-ped-2e' }],
                    '3e': [{ nom: 'Didactique', emoji: '📋', matiere: 'didact-ped-3e' }],
                    '4e': [{ nom: 'Didactique', emoji: '📋', matiere: 'didact-ped-4e' }],
                }
            },
            'coupe-couture': {
                nom: 'Coupe & Couture',
                icon: '🧵',
                desc: 'Techniques de coupe, couture, mode',
                matieres: {
                    '1ere': [{ nom: 'Techniques de coupe', emoji: '✂️', matiere: 'coupe-cc-1ere' }],
                    '2e': [{ nom: 'Couture', emoji: '🧵', matiere: 'couture-cc-2e' }],
                    '3e': [{ nom: 'Couture avancée', emoji: '🧵', matiere: 'couture-cc-3e' }],
                    '4e': [{ nom: 'Mode et création', emoji: '👗', matiere: 'mode-cc-4e' }],
                }
            },
            'mecanique': {
                nom: 'Mécanique',
                icon: '🔧',
                desc: 'Mécanique générale & auto',
                matieres: {
                    '1ere': [{ nom: 'Mécanique générale', emoji: '🔩', matiere: 'mec-gen-1ere' }],
                    '2e': [{ nom: 'Mécanique auto', emoji: '🚗', matiere: 'mec-auto-2e' }],
                    '3e': [{ nom: 'Mécanique auto', emoji: '🚗', matiere: 'mec-auto-3e' }],
                    '4e': [{ nom: 'Mécanique avancée', emoji: '⚙️', matiere: 'mec-av-4e' }],
                }
            },
            'electricite': {
                nom: 'Électricité',
                icon: '⚡',
                desc: 'Installations, circuits électriques',
                matieres: {
                    '1ere': [{ nom: 'Électricité générale', emoji: '💡', matiere: 'elec-gen-1ere' }],
                    '2e': [{ nom: 'Circuits', emoji: '🔌', matiere: 'circuits-2e' }],
                    '3e': [{ nom: 'Installations', emoji: '🏠', matiere: 'install-3e' }],
                    '4e': [{ nom: 'Électricité industrielle', emoji: '🏭', matiere: 'elec-ind-4e' }],
                }
            },
            'electronique': {
                nom: 'Électronique',
                icon: '💻',
                desc: 'Commutation & Industriel',
                matieres: {
                    '1ere': [{ nom: 'Électronique de base', emoji: '🔋', matiere: 'electro-base-1ere' }],
                    '2e': [{ nom: 'Commutation', emoji: '🔄', matiere: 'commutation-2e' }],
                    '3e': [{ nom: 'Industriel', emoji: '🏭', matiere: 'industriel-3e' }],
                    '4e': [{ nom: 'Systèmes électroniques', emoji: '🖥️', matiere: 'systemes-4e' }],
                }
            }
        };

        const data = sectionsData[section] || sectionsData['scientifique'];

        // Mise à jour titres
        document.getElementById('sectionTitre').textContent = data.nom;
        document.getElementById('sectionIcon').textContent = data.icon;
        document.getElementById('sectionNom').textContent = data.nom;
        document.getElementById('sectionDesc').textContent = data.desc;

        // Affichage initial : 1ère
        let classeActive = '1ere';
        afficherMatieres(classeActive);

        function afficherMatieres(classe) {
            const matieres = data.matieres[classe] || [];
            const container = document.getElementById('coursesList');
            container.innerHTML = matieres.map(m => `
                <a href="cours.html?matiere=${m.matiere}" class="course-card">
                    <div class="course-emoji">${m.emoji}</div>
                    <div class="course-info">
                        <h3>${m.nom}</h3>
                        <p>${classe} année</p>
                        <div class="badge-row">
                            <span class="badge badge-audio">🎧 Audio</span>
                            <span class="badge badge-quiz">📝 Quiz</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        function filterClasse(classe) {
            classeActive = classe;
            // Mise à jour boutons
            document.querySelectorAll('.class-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.trim().startsWith(classe.charAt(0))) {
                    btn.classList.add('active');
                }
            });
            afficherMatieres(classe);
        }
    </script>
</body>
</html>
